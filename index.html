<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Junior Lacrosse Band | Louisiana Swamp Pop</title>
    <meta name="description" content="Junior Lacrosse Band — Louisiana Swamp Pop, live and loud across the Gulf Coast. Book us for your next event." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
    <meta property="og:title" content="Junior Lacrosse Band" />
    <meta property="og:description" content="Official website of Junior Lacrosse Band" />
    <meta property="og:image" content="https://juniorlacrosseband.com/images/og-image.jpg" />
    <meta property="og:url" content="https://juniorlacrosseband.com" />
    <meta property="og:type" content="website" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <script>
  fetch('https://admin.robosouthla.com/api/themes?filters[artist][$eq]=Junior Lacrosse')
    .then(r => r.json())
    .then(json => {
      const t = json.data[0];
      if (!t) return;
      const root = document.documentElement;
      if (t.primaryColor) root.style.setProperty('--theme-primary', t.primaryColor);
      if (t.secondaryColor) root.style.setProperty('--theme-secondary', t.secondaryColor);
      if (t.accentColor) root.style.setProperty('--theme-accent', t.accentColor);
      if (t.backgroundColor) root.style.setProperty('--theme-background', t.backgroundColor);
      if (t.surfaceColor) root.style.setProperty('--theme-surface', t.surfaceColor);
      if (t.textLight) root.style.setProperty('--theme-text-light', t.textLight);
      if (t.shadowPrimary) root.style.setProperty('--theme-shadow-primary', t.shadowPrimary);
      if (t.shadowSecondary) root.style.setProperty('--theme-shadow-secondary', t.shadowSecondary);
      if (t.gradientAccent) root.style.setProperty('--theme-gradient-accent', t.gradientAccent);
      if (t.fontHeaderUrl) { const link = document.createElement('link'); link.rel = 'stylesheet'; link.href = t.fontHeaderUrl; document.head.appendChild(link); }
      if (t.fontBodyUrl) { const link = document.createElement('link'); link.rel = 'stylesheet'; link.href = t.fontBodyUrl; document.head.appendChild(link); }
    });
</script>
  </head>
  <body class="bg-neutral-950 text-stone-50">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
